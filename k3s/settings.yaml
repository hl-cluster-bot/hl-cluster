---
# Configuration for the k3s cluster using the xanmanning.k3s Ansible role
# See: https://github.com/PyratLabs/ansible-role-k3s
k3s_become: true
k3s_etcd_datastore: true
k3s_install_hard_links: true
k3s_registries:
  mirrors:
    docker.io:
    gcr.io:
    ghcr.io:
    k8s.gcr.io:
    lscr.io:
    mcr.microsoft.com:
    public.ecr.aws:
    quay.io:
    registry.k8s.io:
# renovate: datasource=github-releases depName=k3s-io/k3s
k3s_release_version: v1.33.3+k3s1
k3s_use_unsupported_config: true

kube_vip_addr: 10.101.0.100
cluster_cidr: 10.42.0.0/16
service_cidr: 10.43.0.0/16
