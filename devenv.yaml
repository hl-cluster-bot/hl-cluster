---
# yaml-language-server: $schema=https://devenv.sh/devenv.schema.json
inputs:
  nixpkgs:
    url: github:nixos/nixpkgs/nixos-unstable
  git-hooks:
    url: github:cachix/git-hooks.nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  agent-skills:
    url: github:Kyure-A/agent-skills-nix
    inputs:
      nixpkgs:
        follows: nixpkgs
  flux-agent-skills:
    url: github:fluxcd/agent-skills
    flake: false
