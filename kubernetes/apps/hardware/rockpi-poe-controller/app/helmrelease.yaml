---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: rockpi-poe-controller
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      rockpi-poe-controller:
        type: daemonset
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/tolkonepiu/rockpi-poe-controller
              tag: v0.3.1
            env:
              - name: POE_LV0
                value: "40"
              - name: POE_LV1
                value: "45"
              - name: POE_LV2
                value: "50"
              - name: POE_LV3
                value: "55"
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              privileged: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities:
                add:
                  - SYS_RAWIO
            resources:
              requests:
                cpu: 50m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi
    defaultPodOptions:
      dnsPolicy: ClusterFirst
      hostNetwork: false
      tolerations:
        - key: "node-role.kubernetes.io/control-plane"
          operator: "Exists"
          effect: "NoSchedule"
        - key: "node-role.kubernetes.io/master"
          operator: "Exists"
          effect: "NoSchedule"
      nodeSelector:
        kubernetes.io/os: linux
        kubernetes.io/arch: arm64
    persistence:
      proc-cpu-info:
        type: hostPath
        hostPath: /proc/cpuinfo
        hostPathType: File
        globalMounts:
          - path: /proc/cpuinfo
            readOnly: true
      proc-device-tree:
        type: hostPath
        hostPath: /proc/device-tree
        hostPathType: Directory
        globalMounts:
          - path: /proc/device-tree
            readOnly: true
      thermal:
        type: hostPath
        hostPath: /sys/class/thermal
        hostPathType: Directory
        globalMounts:
          - path: /sys/class/thermal
            readOnly: true
      pwm:
        type: hostPath
        hostPath: /sys/class/pwm
        hostPathType: Directory
        globalMounts:
          - path: /sys/class/pwm
            readOnly: false
      gpiochip0:
        type: hostPath
        hostPath: /dev/gpiochip0
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/gpiochip0
            readOnly: false
      gpiochip1:
        type: hostPath
        hostPath: /dev/gpiochip1
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/gpiochip1
            readOnly: false
      gpiochip2:
        type: hostPath
        hostPath: /dev/gpiochip2
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/gpiochip2
            readOnly: false
      gpiochip3:
        type: hostPath
        hostPath: /dev/gpiochip3
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/gpiochip3
            readOnly: false
      gpiochip4:
        type: hostPath
        hostPath: /dev/gpiochip4
        hostPathType: CharDevice
        globalMounts:
          - path: /dev/gpiochip4
            readOnly: false
      gpio-sysfs:
        type: hostPath
        hostPath: /sys/class/gpio
        hostPathType: Directory
        globalMounts:
          - path: /sys/class/gpio
            readOnly: false
