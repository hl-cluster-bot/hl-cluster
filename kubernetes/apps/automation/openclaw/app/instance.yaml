---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  image:
    repository: ghcr.io/tolkonepiu/openclaw-full
    tag: v2026.4.2
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=512"
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "640Mi"
    limits:
      cpu: "2"
      memory: "896Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
      prometheusRule:
        enabled: false
      grafanaDashboard:
        enabled: false
  probes:
    startup:
      timeoutSeconds: 5
      failureThreshold: 90
    liveness:
      initialDelaySeconds: 60
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 15
      timeoutSeconds: 5
      failureThreshold: 5
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - workspaceFiles
  gateway:
    controlUiOrigins:
      - "https://openclaw.popov.wtf"
    existingSecret: openclaw-gateway-token
  plugins:
    - "@vectorize-io/hindsight-openclaw@0.5.1"
  workspace:
    configMapRef:
      name: openclaw-context-config
  config:
    mergeMode: overwrite
    raw:
      gateway:
        reload:
          mode: "off"
      agents:
        defaults:
          model:
            primary: openai/gpt-5.4
          contextPruning:
            mode: cache-ttl
            ttl: 15m
          thinkingDefault: medium
          skipBootstrap: true
        list:
          - id: kestrel
            default: true
            identity:
              name: Kestrel
              emoji: 🤖
      skills:
        load:
          watch: false
        install:
          nodeManager: npm
        allowBundled:
          - clawhub
          - skill-creator
      tools:
        exec:
          host: gateway
          security: full
          ask: "off"
          strictInlineEval: false
      plugins:
        enabled: true
        load:
          paths:
            - /home/openclaw/.openclaw/node_modules/@vectorize-io/hindsight-openclaw
        allow:
          - hindsight-openclaw
        slots:
          memory: hindsight-openclaw
        entries:
          hindsight-openclaw:
            enabled: true
            config:
              dynamicBankGranularity:
                - agent
      session:
        scope: per-sender
        maintenance:
          rotateBytes: 10mb
      update:
        auto:
          enabled: false
      cli:
        banner:
          taglineMode: "off"
      canvasHost:
        enabled: false
      discovery:
        mdns:
          mode: "off"
        wideArea:
          enabled: false
      acp:
        enabled: false
      mcp:
        servers:
          github-mcp-server:
            transport: streamable-http
            url: https://api.githubcopilot.com/mcp/
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
            connectionTimeoutMs: 30000
          kubernetes-mcp:
            transport: sse
            url: http://kubernetes-mcp-server.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          victoria-metrics-mcp:
            transport: sse
            url: http://victoriametrics-mcp-server.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          # Temporarily disable flux-mcp until (openclaw/openclaw#60158) is fixed.
          # flux-mcp:
          #   transport: sse
          #   url: http://flux-operator-mcp.automation.svc.cluster.local:9090/sse
          #   connectionTimeoutMs: 30000
