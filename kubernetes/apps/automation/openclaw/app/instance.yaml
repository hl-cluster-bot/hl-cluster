---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  image:
    repository: ghcr.io/tolkonepiu/openclaw-full
    tag: v2026.4.5
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=512"
    - name: OPENCLAW_SKIP_CHANNELS
      value: "1"
    - name: OPENCLAW_SKIP_GMAIL_WATCHER
      value: "1"
    - name: OPENCLAW_SKIP_CANVAS_HOST
      value: "1"
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "640Mi"
    limits:
      memory: "1024Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      grafanaDashboard:
        enabled: true
  probes:
    startup:
      initialDelaySeconds: 30
      timeoutSeconds: 10
      failureThreshold: 90
    liveness:
      initialDelaySeconds: 60
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
  selfConfigure:
    enabled: true
    allowedActions:
      - skills
      - workspaceFiles
  gateway:
    controlUiOrigins:
      - "https://openclaw.popov.wtf"
    existingSecret: openclaw-gateway-token
  plugins:
    - "@honcho-ai/openclaw-honcho@1.0.4"
  workspace:
    configMapRef:
      name: openclaw-context-config
  initContainers:
    - name: init-db
      image: ghcr.io/home-operations/postgres-init:18
      env:
        - name: INIT_POSTGRES_HOST
          value: tolstoy-rw.database.svc.cluster.local
        - name: INIT_POSTGRES_PORT
          value: "5432"
        - name: INIT_POSTGRES_DBNAME
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DBNAME
        - name: INIT_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DB_USER
        - name: INIT_POSTGRES_PASS
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DB_PASS
        - name: INIT_POSTGRES_SUPER_USER
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_USER
        - name: INIT_POSTGRES_SUPER_PASS
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_PASS
    - name: init-extensions
      image: postgres:18
      env:
        - name: PGHOST
          value: tolstoy-rw.database.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DBNAME
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_PASS
      command:
        - bash
        - -lc
        - psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
  config:
    mergeMode: overwrite
    raw:
      gateway:
        reload:
          mode: "off"
      agents:
        defaults:
          model:
            primary: openai/gpt-5.4
          contextPruning:
            mode: cache-ttl
            ttl: 15m
          thinkingDefault: medium
          skipBootstrap: true
        list:
          - id: kestrel
            default: true
            identity:
              name: Kestrel
              emoji: 🤖
      diagnostics:
        enabled: true
        otel:
          enabled: true
          endpoint: http://localhost:4318
          metrics: true
      skills:
        load:
          watch: false
        install:
          nodeManager: npm
        allowBundled:
          - clawhub
          - skill-creator
      tools:
        exec:
          host: gateway
          security: full
          ask: "off"
          strictInlineEval: false
      plugins:
        enabled: true
        load:
          paths:
            - /home/openclaw/.openclaw/node_modules/@honcho-ai/openclaw-honcho
        allow:
          - diagnostics-otel
          - openclaw-honcho
        deny:
          - amazon-bedrock
          - amazon-bedrock-mantle
          - anthropic
          - anthropic-vertex
          - byteplus
          - chutes
          - cloudflare-ai-gateway
          - comfy
          - copilot-proxy
          - deepseek
          - fal
          - fireworks
          - github-copilot
          - google
          - huggingface
          - kilocode
          - kimi
          - litellm
          - microsoft-foundry
          - minimax
          - mistral
          - moonshot
          - nvidia
          - ollama
          - opencode
          - opencode-go
          - qianfan
          - qwen
          - sglang
          - stepfun
          - synthetic
          - together
          - venice
          - vercel-ai-gateway
          - vllm
          - volcengine
          - vydra
          - xai
          - xiaomi
          - zai
        slots:
          memory: openclaw-honcho
        entries:
          diagnostics-otel:
            enabled: true
          openclaw-honcho:
            enabled: true
            config:
              apiKey: ${HONCHO_API_KEY}
          # openclaw-mem0:
          #   enabled: true
          #   config:
          #     mode: open-source
          #     userId: kestrel
          #     oss:
          #       vectorStore:
          #         provider: pgvector
          #         config:
          #           host: tolstoy-rw.database.svc.cluster.local
          #           port: 5432
          #           user: ${OPENCLAW_MEM0_DB_USER}
          #           password: ${OPENCLAW_MEM0_DB_PASS}
          #           sslmode: disable
      session:
        scope: per-sender
        maintenance:
          rotateBytes: 10mb
      update:
        auto:
          enabled: false
      cli:
        banner:
          taglineMode: "off"
      canvasHost:
        enabled: false
      discovery:
        mdns:
          mode: "off"
        wideArea:
          enabled: false
      acp:
        enabled: false
      mcp:
        servers:
          github-mcp-server:
            transport: streamable-http
            url: https://api.githubcopilot.com/mcp/
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
            connectionTimeoutMs: 30000
          kubernetes-mcp:
            transport: sse
            url: http://kubernetes-mcp-server.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          victoria-metrics-mcp:
            transport: sse
            url: http://mcp-victoriametrics.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          flux-mcp:
            transport: sse
            url: http://flux-operator-mcp.automation.svc.cluster.local:9090/sse
            connectionTimeoutMs: 30000
