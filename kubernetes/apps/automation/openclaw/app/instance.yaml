---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: openclaw
spec:
  image:
    repository: ghcr.io/tolkonepiu/openclaw-full
    tag: v2026.4.8
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=512"
    - name: OPENCLAW_SKIP_CHANNELS
      value: "1"
    - name: OPENCLAW_SKIP_GMAIL_WATCHER
      value: "1"
    - name: OPENCLAW_SKIP_CANVAS_HOST
      value: "1"
    - name: PUSHOVER_USER_KEY
      valueFrom:
        secretKeyRef:
          name: cluster-secrets
          key: PUSHOVER_USER_KEY
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "640Mi"
    limits:
      memory: "1024Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      grafanaDashboard:
        enabled: true
  probes:
    startup:
      initialDelaySeconds: 30
      timeoutSeconds: 10
      failureThreshold: 90
    liveness:
      initialDelaySeconds: 60
      timeoutSeconds: 10
      failureThreshold: 5
    readiness:
      initialDelaySeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
  selfConfigure:
    enabled: false
  gateway:
    controlUiOrigins:
      - "https://openclaw.popov.wtf"
    existingSecret: openclaw-gateway-token
  skills:
    - "@digitallyborn/pushover-notify"
  plugins:
    - "@honcho-ai/openclaw-honcho@1.2.2"
  workspace:
    configMapRef:
      name: openclaw-context-config
  config:
    mergeMode: overwrite
    raw:
      gateway:
        reload:
          mode: "off"
      agents:
        defaults:
          maxConcurrent: 4
          params:
            cacheRetention: "long"
          model:
            primary: openai/gpt-5.4
            fallbacks:
              - openai/gpt-5.4-mini
              - openai/gpt-5.4-nano
          subagents:
            maxConcurrent: 8
            model: openai/gpt-5.4-mini
          models:
            openai/gpt-5.4:
              alias: reasoning
              params:
                cacheRetention: long
            openai/gpt-5.4-mini:
              alias: worker
              params:
                cacheRetention: long
          contextPruning:
            mode: cache-ttl
            ttl: 1h
            keepLastAssistants: 3
          contextInjection: continuation-skip
          skipBootstrap: true
          heartbeat:
            every: 0m
            model: openai/gpt-5.4-nano
            session: main
            target: none
            lightContext: true
            isolatedSession: true
        list:
          - id: kestrel
            default: true
            identity:
              name: Kestrel
              emoji: 🤖
      diagnostics:
        enabled: true
        otel:
          enabled: true
          endpoint: http://localhost:4318
          metrics: true
      skills:
        load:
          watch: false
        install:
          nodeManager: npm
        allowBundled:
          - clawhub
          - skill-creator
      tools:
        exec:
          host: gateway
          security: full
          ask: "off"
          strictInlineEval: false
      plugins:
        enabled: true
        load:
          paths:
            - /home/openclaw/.openclaw/node_modules/@honcho-ai/openclaw-honcho
        allow:
          - diagnostics-otel
          - openclaw-honcho
        deny:
          - amazon-bedrock
          - amazon-bedrock-mantle
          - anthropic
          - anthropic-vertex
          - byteplus
          - chutes
          - cloudflare-ai-gateway
          - comfy
          - copilot-proxy
          - deepseek
          - fal
          - fireworks
          - github-copilot
          - google
          - huggingface
          - kilocode
          - kimi
          - litellm
          - microsoft-foundry
          - minimax
          - mistral
          - moonshot
          - nvidia
          - ollama
          - opencode
          - opencode-go
          - qianfan
          - qwen
          - sglang
          - stepfun
          - synthetic
          - together
          - venice
          - vercel-ai-gateway
          - vllm
          - volcengine
          - vydra
          - xai
          - xiaomi
          - zai
        slots:
          memory: openclaw-honcho
        entries:
          diagnostics-otel:
            enabled: true
          openclaw-honcho:
            enabled: true
      cron:
        enabled: true
        maxConcurrentRuns: 1
        retry:
          maxAttempts: 3
          backoffMs: [60000, 120000, 300000]
          retryOn: ["rate_limit", "overloaded", "network", "server_error"]
        sessionRetention: "24h"
        runLog:
          maxBytes: "2mb"
          keepLines: 2000
      session:
        scope: per-sender
        maintenance:
          mode: "enforce"
          pruneAfter: "30d"
          maxEntries: 500
          rotateBytes: "100mb"
          resetArchiveRetention: "30d"
      update:
        auto:
          enabled: false
      cli:
        banner:
          taglineMode: "off"
      canvasHost:
        enabled: false
      discovery:
        mdns:
          mode: "off"
        wideArea:
          enabled: false
      acp:
        enabled: false
      mcp:
        servers:
          github-mcp-server:
            transport: streamable-http
            url: https://api.githubcopilot.com/mcp/
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
            connectionTimeoutMs: 30000
          kubernetes-mcp:
            transport: streamable-http
            url: http://kubernetes-mcp-server.automation.svc.cluster.local:8080/mcp
            connectionTimeoutMs: 30000
          victoria-metrics-mcp:
            transport: streamable-http
            url: http://mcp-victoriametrics.automation.svc.cluster.local:8080/mcp
            connectionTimeoutMs: 30000
          flux-mcp:
            transport: streamable-http
            url: http://flux-operator-mcp.automation.svc.cluster.local:9090/mcp
            connectionTimeoutMs: 30000
