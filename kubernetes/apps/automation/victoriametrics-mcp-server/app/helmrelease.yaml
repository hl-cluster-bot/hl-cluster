---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: victoriametrics-mcp-server
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: victoria-metrics
      namespace: observability
  values:
    controllers:
      victoriametrics-mcp-server:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: ghcr.io/victoriametrics/mcp-victoriametrics
              tag: v1.20.0
            env:
              MCP_DISABLED_TOOLS: documentation,export,flags,metric_relabel_debug,downsampling_filters_debug,retention_filters_debug,test_rules
              MCP_LISTEN_ADDR: 0.0.0.0:8080
              MCP_LOG_FORMAT: json
              MCP_SERVER_MODE: sse
              VM_INSTANCE_ENTRYPOINT: http://vmselect-stack.observability.svc.cluster.local:8481
              VM_INSTANCE_TYPE: cluster
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/liveness
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/readiness
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 1
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
              limits:
                memory: 128Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        type: ClusterIP
        ports:
          http:
            port: *port
    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
