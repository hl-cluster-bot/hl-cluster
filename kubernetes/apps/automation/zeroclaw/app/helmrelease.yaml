---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zeroclaw
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      zeroclaw:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            envFrom:
              - secretRef:
                  name: zeroclaw-secret
            env:
              - name: INIT_POSTGRES_HOST
                value: postgres17-rw.database.svc.cluster.local
              - name: INIT_POSTGRES_PORT
                value: "5432"
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: zeroclaw-secret
                    key: ZEROCLAW_DBNAME
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: zeroclaw-secret
                    key: ZEROCLAW_DB_USER
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: zeroclaw-secret
                    key: ZEROCLAW_DB_PASS
              - name: INIT_POSTGRES_SUPER_USER
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_USER
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_PASS
        containers:
          app:
            image:
              repository: ghcr.io/zeroclaw-labs/zeroclaw
              tag: v0.5.1
            args:
              - daemon
            envFrom:
              - secretRef:
                  name: zeroclaw-secret
            env:
              PATH: /usr/local/bin:/usr/bin:/bin
              SHELL: /bin/bash
              ZEROCLAW_GATEWAY_PORT: "42617"
              ZEROCLAW_CONFIG_DIR: /zeroclaw-data/.zeroclaw
              ZEROCLAW_WORKSPACE: /zeroclaw-data/workspace
              ZEROCLAW_STORAGE_PROVIDER: postgres
              ZEROCLAW_STORAGE_DB_URL: postgresql://$(ZEROCLAW_DB_USER):$(ZEROCLAW_DB_PASS)@postgres17-rw.database.svc.cluster.local:5432/$(ZEROCLAW_DBNAME)
              ZEROCLAW_STORAGE_CONNECT_TIMEOUT_SECS: "5"
              HOME: /zeroclaw-data
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 42617
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      workspace:
        type: emptyDir
        globalMounts:
          - path: /zeroclaw-data/workspace
      config-dir:
        type: emptyDir
        globalMounts:
          - path: /zeroclaw-data/.zeroclaw
      config-file:
        type: configMap
        name: zeroclaw-configmap
        globalMounts:
          - path: /zeroclaw-data/.zeroclaw/config.toml
            subPath: config.toml
            readOnly: true
          - path: /zeroclaw-data/.zeroclaw/identity.json
            subPath: identity.json
            readOnly: true
      pushover-env:
        type: secret
        name: zeroclaw-secret
        globalMounts:
          - path: /zeroclaw-data/workspace/.env
            subPath: .env
            readOnly: true
    serviceMonitor:
      app:
        endpoints:
          - port: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
