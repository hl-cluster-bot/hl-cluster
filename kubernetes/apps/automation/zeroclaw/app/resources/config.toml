default_provider = "openrouter"
default_model = "anthropic/claude-sonnet-4"
default_temperature = 0.4
provider_timeout_secs = 180

[agent]
parallel_tools = true
max_tool_iterations = 15
max_context_tokens = 128000
compact_context = false

[observability]
backend = "prometheus"

[identity]
format = "aieos"
aieos_path = "identity.json"

[[model_routes]]
hint = "fast"
provider = "openrouter"
model = "google/gemini-2.5-flash"

[[model_routes]]
hint = "reasoning"
provider = "openrouter"
model = "openai/o3"

[[model_routes]]
hint = "coding"
provider = "openrouter"
model = "anthropic/claude-sonnet-4"

[query_classification]
enabled = true

[[query_classification.rules]]
hint = "reasoning"
keywords = ["analyze", "reason", "debug", "investigate", "optimize", "plan", "architecture"]
priority = 20

[[query_classification.rules]]
hint = "coding"
keywords = ["code", "refactor", "implement", "function", "api", "bug", "test"]
patterns = ["```", "function ", "class ", "def ", "fn "]
min_length = 20
priority = 30

[[query_classification.rules]]
hint = "fast"
keywords = ["summarize", "brief", "quick", "short", "explain"]
priority = 10

[gateway]
port = 42617
host = "[::]"
allow_public_bind = true

[mcp]
enabled = true
deferred_loading = true

[[mcp.servers]]
name = "kubernetes-mcp"
transport = "sse"
url = "http://kubernetes-mcp-server.automation.svc.cluster.local:8080/sse"

[[mcp.servers]]
name = "victoria-metrics-mcp"
transport = "sse"
url = "http://victoriametrics-mcp-server.automation.svc.cluster.local:8080/sse"

[[mcp.servers]]
name = "flux-mcp"
transport = "sse"
url = "http://flux-operator-mcp.automation.svc.cluster.local:9090/sse"
