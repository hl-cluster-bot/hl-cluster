---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: zeroclaw-configmap
    files:
      - config.toml=./resources/config.toml
generatorOptions:
  disableNameSuffixHash: true
