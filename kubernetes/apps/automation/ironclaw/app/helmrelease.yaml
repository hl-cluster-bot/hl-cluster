---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ironclaw
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      ironclaw:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            env:
              - name: INIT_POSTGRES_HOST
                value: tolstoy-rw.database.svc.cluster.local
              - name: INIT_POSTGRES_PORT
                value: "5432"
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: ironclaw-secret
                    key: IRONCLAW_DBNAME
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: ironclaw-secret
                    key: IRONCLAW_DB_USER
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: ironclaw-secret
                    key: IRONCLAW_DB_PASS
              - name: INIT_POSTGRES_SUPER_USER
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_USER
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_PASS
          02-init-extensions:
            image:
              repository: postgres
              tag: "18"
            env:
              - name: PGHOST
                value: tolstoy-rw.database.svc.cluster.local
              - name: PGPORT
                value: "5432"
              - name: PGDATABASE
                valueFrom:
                  secretKeyRef:
                    name: ironclaw-secret
                    key: IRONCLAW_DBNAME
              - name: PGUSER
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_USER
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_PASS
            command:
              - bash
              - -lc
              - psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
        containers:
          app:
            image:
              repository: ghcr.io/tolkonepiu/ironclaw
              tag: v0.23.0
            envFrom:
              - secretRef:
                  name: ironclaw-secret
            env:
              DATABASE_URL: postgres://$(IRONCLAW_DB_USER):$(IRONCLAW_DB_PASS)@tolstoy-rw.database.svc.cluster.local:5432/$(IRONCLAW_DBNAME)
              DATABASE_POOL_SIZE: "10"
              DATABASE_SSLMODE: disable
              AGENT_NAME: ironclaw
              CLI_ENABLED: "false"
              GATEWAY_ENABLED: "true"
              GATEWAY_HOST: 0.0.0.0
              GATEWAY_PORT: &port 3000
              HTTP_HOST: 0.0.0.0
              HTTP_PORT: &webhookPort 8080
              IRONCLAW_IN_DOCKER: "true"
              ONBOARD_COMPLETED: "true"
              IRONCLAW_RESTART_DELAY: "5"
              IRONCLAW_MAX_FAILURES: "10"
              SANDBOX_ENABLED: "false"
              HEARTBEAT_ENABLED: "false"
              EMBEDDING_ENABLED: "true"
              LLM_BACKEND: openai_compatible
              LLM_BASE_URL: https://openrouter.ai/api/v1
              LLM_MODEL: anthropic/claude-sonnet-4
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 256Mi
              limits:
                memory: 1Gi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: ironclaw
        ports:
          http:
            port: *port
          webhook:
            port: *webhookPort
    persistence:
      state:
        type: emptyDir
        advancedMounts:
          ironclaw:
            app:
              - path: /home/ironclaw/.ironclaw
    route:
      app:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
