---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: goclaw
spec:
  interval: 1h
  timeout: 10m
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    controllers:
      goclaw:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          01-init-db:
            image:
              repository: ghcr.io/home-operations/postgres-init
              tag: "18"
            env:
              - name: INIT_POSTGRES_HOST
                value: tolstoy-rw.database.svc.cluster.local
              - name: INIT_POSTGRES_PORT
                value: "5432"
              - name: INIT_POSTGRES_DBNAME
                valueFrom:
                  secretKeyRef:
                    name: goclaw-secret
                    key: GOCLAW_DBNAME
              - name: INIT_POSTGRES_USER
                valueFrom:
                  secretKeyRef:
                    name: goclaw-secret
                    key: GOCLAW_DB_USER
              - name: INIT_POSTGRES_PASS
                valueFrom:
                  secretKeyRef:
                    name: goclaw-secret
                    key: GOCLAW_DB_PASS
              - name: INIT_POSTGRES_SUPER_USER
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_USER
              - name: INIT_POSTGRES_SUPER_PASS
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_PASS
          02-init-extensions:
            image:
              repository: postgres
              tag: "18"
            env:
              - name: PGHOST
                value: tolstoy-rw.database.svc.cluster.local
              - name: PGPORT
                value: "5432"
              - name: PGDATABASE
                valueFrom:
                  secretKeyRef:
                    name: goclaw-secret
                    key: GOCLAW_DBNAME
              - name: PGUSER
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_USER
              - name: PGPASSWORD
                valueFrom:
                  secretKeyRef:
                    name: cluster-secrets
                    key: POSTGRES_SUPER_PASS
            command:
              - bash
              - -lc
              - psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS pgcrypto; CREATE EXTENSION IF NOT EXISTS vector;"
          03-init-skills:
            image:
              repository: node
              tag: "22"
            env:
              HOME: /tmp
              NPM_CONFIG_CACHE: /tmp/npm
              DISABLE_TELEMETRY: "1"
              CI: "true"
              SKILLS_AGENT: openclaw
            command:
              - /bin/sh
              - -ec
              - |
                rm -rf /tmp/skills-installer
                mkdir -p /app/data/skills /tmp/skills-installer
                cd /tmp/skills-installer || exit 1

                npx --yes skills add github/awesome-copilot -a "$SKILLS_AGENT" --copy -y \
                    --skill 'agent-governance' \
                    --skill 'context-map' \
                    --skill 'create-implementation-plan' \
                    --skill 'git-commit'

                for skill in /tmp/skills-installer/skills/*; do
                    name=$(basename "$skill")
                    if [ ! -e "/app/data/skills/$name" ]; then
                        cp -R "$skill" /app/data/skills/
                    fi
                done
        containers:
          app:
            image:
              repository: ghcr.io/nextlevelbuilder/goclaw
              tag: v1.74.1-full
            envFrom:
              - secretRef:
                  name: goclaw-secret
            env:
              GOCLAW_HOST: 0.0.0.0
              GOCLAW_PORT: "18790"
              GOCLAW_CONFIG: /app/data/config.json
              GOCLAW_DATA_DIR: /app/data
              GOCLAW_WORKSPACE: /app/workspace
              GOCLAW_SKILLS_DIR: /app/data/skills
              GOCLAW_POSTGRES_DSN: postgresql://$(GOCLAW_DB_USER):$(GOCLAW_DB_PASS)@tolstoy-rw.database.svc.cluster.local:5432/$(GOCLAW_DBNAME)
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 18790
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *port
                  failureThreshold: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 1Gi
      goclaw-web:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/nextlevelbuilder/goclaw-web
              tag: v1.74.1
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &webPort 80
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *webPort
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: *webPort
                  failureThreshold: 30
                  periodSeconds: 10
                  timeoutSeconds: 3
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              runAsNonRoot: false
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities:
                drop: ["ALL"]
                add: ["CHOWN", "SETGID", "SETUID"]
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        controller: goclaw
        ports:
          http:
            port: *port
      web:
        controller: goclaw-web
        ports:
          http:
            port: *webPort
    persistence:
      data:
        type: emptyDir
        globalMounts:
          - path: /app/data
      workspace:
        type: emptyDir
        globalMounts:
          - path: /app/workspace
      skills:
        type: emptyDir
        advancedMounts:
          goclaw:
            app:
              - path: /app/data/skills
      config-file:
        type: configMap
        name: goclaw-configmap
        globalMounts:
          - path: /app/data/config.json
            subPath: config.json
            readOnly: true
      nginx-config:
        type: configMap
        name: goclaw-web-nginx-config
        advancedMounts:
          goclaw-web:
            app:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
    route:
      web:
        hostnames:
          - "{{ .Release.Name }}.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: web
                port: *webPort
