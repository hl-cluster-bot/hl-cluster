apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
configMapGenerator:
  - name: 1mcp-agent-configmap
    files:
      - mcp.json=./resources/config.json
generatorOptions:
  disableNameSuffixHash: true
