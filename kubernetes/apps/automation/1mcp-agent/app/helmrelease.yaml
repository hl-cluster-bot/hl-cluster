---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: one-mcp-agent
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: app-template
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  dependsOn:
    - name: flux-operator-mcp
    - name: kubernetes-mcp-server
  values:
    controllers:
      one-mcp-agent:
        strategy: RollingUpdate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/1mcp-app/agent
              tag: v0.30.1
            env:
              HOME: /config
              ONE_MCP_CONFIG: /app/mcp.json
              ONE_MCP_ENABLE_SESSION_PERSISTENCE: "false"
              ONE_MCP_HEALTH_INFO_LEVEL: minimal
              ONE_MCP_HOST: 0.0.0.0
              ONE_MCP_PORT: "3050"
              ONE_MCP_TRANSPORT: http
              XDG_CONFIG_HOME: /config/.config
              ONE_MCP_EXTERNAL_URL: "https://mcp.${SECRET_DOMAIN}"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/live
                    port: &port 3050
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health/ready
                    port: *port
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        ports:
          http:
            port: *port
    persistence:
      runtime-config:
        type: emptyDir
        globalMounts:
          - path: /config
      config-file:
        type: configMap
        name: 1mcp-agent-configmap
        globalMounts:
          - path: /app/mcp.json
            subPath: mcp.json
            readOnly: true
    route:
      app:
        hostnames:
          - "mcp.${SECRET_DOMAIN}"
        parentRefs:
          - name: internal
            namespace: kube-system
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
