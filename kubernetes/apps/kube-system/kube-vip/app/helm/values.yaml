---
config:
  # VIP address - this is the address that will be assigned to the load balancer
  address: "10.101.0.100"

env:
  # Interface to bind VIP to (auto-detect if empty)
  vip_interface: ""
  # Enable ARP for VIP
  vip_arp: "true"
  # Enable load balancer functionality for control plane only
  lb_enable: "true"
  # Load balancer port (default kube-api port)
  lb_port: "6443"
  # VIP CIDR (32 for single IP)
  vip_cidr: "32"
  # Enable control plane mode (create VIP for API server)
  cp_enable: "true"
  # Disable service load balancing (Cilium handles this)
  svc_enable: "false"
  # Disable service election since svc_enable is false
  svc_election: "false"
  # Enable VIP leader election
  vip_leaderelection: "true"

affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
        - matchExpressions:
            - key: node-role.kubernetes.io/control-plane
              operator: Exists
