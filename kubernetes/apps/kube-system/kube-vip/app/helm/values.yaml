---
config:
  # VIP address - this is the address that will be assigned to the load balancer
  address: "10.101.0.100"

env:
  # Interface to bind VIP to (auto-detect if empty)
  vip_interface: ""
  # Enable ARP for VIP
  vip_arp: "true"
  # Enable load balancer functionality
  lb_enable: "true"
  # Load balancer port (default kube-api port)
  lb_port: "6443"
  # VIP CIDR (32 for single IP)
  vip_cidr: "32"
  # Disable control plane mode (we're using this as LB only)
  cp_enable: "false"
  # Enable service load balancing
  svc_enable: "true"
  # Disable service election (use leader election instead)
  svc_election: "false"
  # Enable VIP leader election
  vip_leaderelection: "true"

securityContext:
  capabilities:
    add:
      - NET_ADMIN
      - NET_RAW
    drop:
      - ALL

tolerations:
  - effect: NoSchedule
    key: node-role.kubernetes.io/control-plane
    operator: Exists

# Node selector to ensure kube-vip runs only on control plane nodes
nodeSelector:
  node-role.kubernetes.io/control-plane: ""
