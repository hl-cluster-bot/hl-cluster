---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./instance.yaml
  - ./httproute.yaml
  - ./secret.sops.yaml
configMapGenerator:
  - name: kestrel-configmap
    files:
      - openclaw.json5=./resources/openclaw.json5
generatorOptions:
  disableNameSuffixHash: true
