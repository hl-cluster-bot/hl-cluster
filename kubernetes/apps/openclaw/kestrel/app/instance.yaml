---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: kestrel
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.2
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=300"
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
      prometheusRule:
        enabled: true
      grafanaDashboard:
        enabled: true
  initContainers:
    - name: init-db
      image: ghcr.io/home-operations/postgres-init:18
      env:
        - name: INIT_POSTGRES_HOST
          value: tolstoy-rw.database.svc.cluster.local
        - name: INIT_POSTGRES_PORT
          value: "5432"
        - name: INIT_POSTGRES_DBNAME
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DBNAME
        - name: INIT_POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DB_USER
        - name: INIT_POSTGRES_PASS
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DB_PASS
        - name: INIT_POSTGRES_SUPER_USER
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_USER
        - name: INIT_POSTGRES_SUPER_PASS
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_PASS
    - name: init-extensions
      image: postgres:18
      env:
        - name: PGHOST
          value: tolstoy-rw.database.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          valueFrom:
            secretKeyRef:
              name: openclaw-secret
              key: OPENCLAW_MEM0_DBNAME
        - name: PGUSER
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_USER
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: cluster-secrets
              key: POSTGRES_SUPER_PASS
      command:
        - bash
        - -lc
        - psql -v ON_ERROR_STOP=1 -c "CREATE EXTENSION IF NOT EXISTS vector;"
  gateway:
    controlUiOrigins:
      - "https://openclaw.${SECRET_DOMAIN}"
    existingSecret: openclaw-gateway-token
  plugins:
    - "@mem0/openclaw-mem0@0.4.1"
  config:
    mergeMode: overwrite
    configMapRef:
      name: kestrel-configmap
      key: openclaw.json5
      format: json5
