---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: kestrel
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.4.1
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=512"
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "640Mi"
    limits:
      cpu: "2"
      memory: "896Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
      prometheusRule:
        enabled: false
      grafanaDashboard:
        enabled: false
  gateway:
    controlUiOrigins:
      - "https://openclaw.${SECRET_DOMAIN}"
    existingSecret: openclaw-gateway-token
  plugins:
    - "@vectorize-io/hindsight-openclaw@0.5.1"
  config:
    mergeMode: overwrite
    raw:
      agents:
        defaults:
          model:
            primary: openai/gpt-5.4
        list:
          - id: kestrel
            default: true
            identity:
              name: Kestrel
              emoji: 🤖
      mcp:
        servers:
          github-mcp-server:
            transport: streamable-http
            url: https://api.githubcopilot.com/mcp/
            headers:
              Authorization: Bearer ${GITHUB_TOKEN}
            connectionTimeoutMs: 30000
          context7:
            transport: streamable-http
            url: https://mcp.context7.com/mcp
            headers:
              CONTEXT7_API_KEY: ${CONTEXT7_API_KEY}
            connectionTimeoutMs: 30000
          kubernetes-mcp:
            transport: sse
            url: http://kubernetes-mcp-server.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          victoria-metrics-mcp:
            transport: sse
            url: http://victoriametrics-mcp-server.automation.svc.cluster.local:8080/sse
            connectionTimeoutMs: 30000
          flux-mcp:
            transport: sse
            url: http://flux-operator-mcp.automation.svc.cluster.local:9090/sse
            connectionTimeoutMs: 30000
      plugins:
        enabled: true
        allow:
          - hindsight-openclaw
        slots:
          memory: hindsight-openclaw
        entries:
          hindsight-openclaw:
            enabled: true
