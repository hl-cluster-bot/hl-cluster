---
# yaml-language-server: $schema=https://raw.githubusercontent.com/openclaw-rocks/openclaw-operator/main/bundle/manifests/openclaw.rocks_openclawinstances.yaml
apiVersion: openclaw.rocks/v1alpha1
kind: OpenClawInstance
metadata:
  name: kestrel
spec:
  image:
    repository: ghcr.io/openclaw/openclaw
    tag: 2026.3.2
  envFrom:
    - secretRef:
        name: openclaw-secret
  env:
    - name: NODE_OPTIONS
      value: "--max-old-space-size=300"
  storage:
    persistence:
      enabled: true
      storageClass: openebs-hostpath
      size: 10Gi
      accessModes:
        - ReadWriteOnce
  resources:
    requests:
      cpu: "100m"
      memory: "384Mi"
    limits:
      cpu: "1"
      memory: "512Mi"
  availability:
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: node-role.kubernetes.io/control-plane
                  operator: DoesNotExist
  security:
    networkPolicy:
      enabled: false
  observability:
    metrics:
      enabled: false
      serviceMonitor:
        enabled: false
      prometheusRule:
        enabled: false
      grafanaDashboard:
        enabled: false
  gateway:
    controlUiOrigins:
      - "https://openclaw.${SECRET_DOMAIN}"
    existingSecret: openclaw-gateway-token
  plugins:
    - "@vectorize-io/hindsight-openclaw@0.5.1"
  config:
    mergeMode: overwrite
    raw:
      gateway:
        reload:
          mode: "off"
      agents:
        defaults:
          memorySearch:
            enabled: false
      plugins:
        enabled: false
