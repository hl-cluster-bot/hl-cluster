---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kestrel-gateway-ingress
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: kestrel
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 18789
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: kestrel-gateway-ingress
  namespace: openclaw
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: kestrel
      app.kubernetes.io/name: openclaw
  ingress:
    - fromEntities:
        - host
        - remote-node
        - kube-apiserver
      toPorts:
        - ports:
            - protocol: TCP
              port: 18789
