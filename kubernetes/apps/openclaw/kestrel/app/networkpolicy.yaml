---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kestrel-gateway-ingress
  namespace: openclaw
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: kestrel
      app.kubernetes.io/name: openclaw
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
      ports:
        - protocol: TCP
          port: 18790
