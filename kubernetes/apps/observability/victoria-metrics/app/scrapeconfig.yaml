---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/monitoring.coreos.com/scrapeconfig_v1alpha1.json
apiVersion: monitoring.coreos.com/v1alpha1
kind: ScrapeConfig
metadata:
  name: &name etcd
spec:
  staticConfigs:
    - targets:
        - 10.101.0.101:2381
        - 10.101.0.102:2381
        - 10.101.0.103:2381
  scrapeInterval: 15s
  metricsPath: /metrics
  relabelings:
    - action: replace
      targetLabel: job
      replacement: *name
---
