---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/refs/heads/main/ocirepository-source-v1beta2.json
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: prometheus-node-exporter
spec:
  interval: 2h
  layerSelector:
    mediaType: application/vnd.cncf.helm.chart.content.v1.tar+gzip
    operation: copy
  url: oci://ghcr.io/prometheus-community/charts/prometheus-node-exporter
  ref:
    tag: 4.47.3
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/fluxcd-community/flux2-schemas/main/helmrelease-helm-v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app prometheus-node-exporter
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: *app
  driftDetection:
    mode: enabled
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      retries: 3
  values:
    collectors:
      enabled:
        - arp
        - bcache
        - bonding
        - btrfs
        - buddyinfo
        - conntrack
        - cpu
        - cpufreq
        - diskstats
        - dmi
        - drbd
        - edac
        - entropy
        - fibrechannel
        - filefd
        - filesystem
        - hwmon
        - infiniband
        - ipvs
        - loadavg
        - mdadm
        - meminfo
        - meminfo_numa
        - mountstats
        - netclass
        - netdev
        - netstat
        - nfs
        - nfsd
        - nvme
        - os
        - powersupplyclass
        - pressure
        - rapl
        - schedstat
        - selinux
        - sockstat
        - softnet
        - stat
        - tapestats
        - textfile
        - thermal_zone
        - time
        - timex
        - udp_queues
        - uname
        - vmstat
        - xfs
        - zfs
      disabled:
        - processes

    extraArgs:
      collector.systemd: ""
      collector.processes: ""
      collector.cpu.info: ""

    prometheus:
      monitor:
        enabled: true
        interval: 30s
        scrapeTimeout: 30s
        labels:
          release: victoria-metrics
