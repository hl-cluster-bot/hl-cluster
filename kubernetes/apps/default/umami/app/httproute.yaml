---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/gateway.networking.k8s.io/httproute_v1.json
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: umami-script
  namespace: default
spec:
  hostnames: ["umm.popov.wtf"]
  parentRefs:
    - name: external
      namespace: kube-system
      sectionName: https
  rules:
    - backendRefs:
        - name: umami
          namespace: default
          port: 3000
      matches:
        - path:
            type: PathPrefix
            value: /script.js
