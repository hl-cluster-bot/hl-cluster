---
# yaml-language-server: $schema=https://raw.githubusercontent.com/ansible/ansible-lint/main/src/ansiblelint/schemas/ansible.json#/$defs/tasks
- name: Ensure sch_fq module is available
  community.general.modprobe:
    name: sch_fq
    state: present
  failed_when: false

- name: Ensure tcp_bbr module is available
  community.general.modprobe:
    name: tcp_bbr
    state: present

- name: Ensure BBR is in available congestion algorithms
  ansible.builtin.command: sysctl net.ipv4.tcp_available_congestion_control
  register: cc_algos
  changed_when: false

- name: Fail if BBR is not available
  ansible.builtin.fail:
    msg: "BBR is not available. Check kernel config: CONFIG_TCP_CONG_BBR"
  when: "'bbr' not in cc_algos.stdout"

- name: Set congestion control to bbr immediately
  ansible.posix.sysctl:
    name: net.ipv4.tcp_congestion_control
    value: bbr
    sysctl_set: true
    state: present

- name: Set default qdisc to fq immediately
  ansible.posix.sysctl:
    name: net.core.default_qdisc
    value: fq
    sysctl_set: true
    state: present
