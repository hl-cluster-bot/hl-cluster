---
# Configuration for the k3s cluster using the xanmanning.k3s Ansible role
# See: https://github.com/PyratLabs/ansible-role-k3s
k3s_become: true
k3s_etcd_datastore: true
k3s_install_hard_links: true
k3s_registries:
  mirrors:
    docker.io:
    gcr.io:
    ghcr.io:
    k8s.gcr.io:
    lscr.io:
    mcr.microsoft.com:
    public.ecr.aws:
    quay.io:
    registry.k8s.io:
k3s_use_unsupported_config: true
