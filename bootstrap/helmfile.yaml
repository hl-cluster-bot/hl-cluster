---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true

repositories:
  - name: cilium
    url: https://helm.cilium.io
  - name: kube-vip
    url: https://kube-vip.github.io/helm-charts

releases:
  - name: kube-vip
    namespace: kube-system
    atomic: true
    chart: kube-vip/kube-vip
    version: 0.7.1
    values: ["../kubernetes/apps/kube-system/kube-vip/app/helm/values.yaml"]

  - name: cilium
    namespace: kube-system
    atomic: true
    chart: cilium/cilium
    version: 1.18.0
    values: ["../kubernetes/apps/kube-system/cilium/app/helm/values.yaml"]
    needs: ["kube-system/kube-vip"]

  - name: coredns
    namespace: kube-system
    atomic: true
    chart: oci://ghcr.io/coredns/charts/coredns
    version: 1.43.1
    values: ["../kubernetes/apps/kube-system/coredns/app/helm/values.yaml"]
    needs: ["kube-system/cilium"]

  - name: cert-manager
    namespace: cert-manager
    atomic: true
    chart: oci://quay.io/jetstack/charts/cert-manager
    version: v1.18.2
    values:
      ["../kubernetes/apps/cert-manager/cert-manager/app/helm/values.yaml"]
    needs: ["kube-system/coredns"]

  - name: flux-operator
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-operator
    version: 0.27.0
    values:
      ["../kubernetes/apps/flux-system/flux-operator/app/helm/values.yaml"]
    needs: ["cert-manager/cert-manager"]

  - name: flux-instance
    namespace: flux-system
    atomic: true
    chart: oci://ghcr.io/controlplaneio-fluxcd/charts/flux-instance
    version: 0.27.0
    values:
      ["../kubernetes/apps/flux-system/flux-instance/app/helm/values.yaml"]
    needs: ["flux-system/flux-operator"]
