---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Update devenv.lock"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 1 # Runs at 00:00 on Monday UTC

jobs:
  update-devenv-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: cachix/install-nix-action@8887e596b4ee1134dae06b98d573bd674693f47c # v26
      - uses: cachix/cachix-action@18cf96c7c98e048e10a83abd92116114cd8504be # v14
        with:
          name: devenv

      - name: Install devenv.sh
        run: nix profile install nixpkgs#devenv

      - name: Run devenv update
        run: devenv update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c5a7806660adbe173f04e3e038b0ccdcd758773c # v6
        with:
          add-paths: |
            devenv.lock
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-devenv-lock
          title: "feat(devenv)!: Update devenv.lock"
          body: |
            Automated update of devenv.lock file.

            This PR was automatically created by the scheduled workflow.
          commit-message: "feat(devenv)!: Update devenv.lock"
          delete-branch: true
