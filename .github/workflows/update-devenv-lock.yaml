---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Update devenv.lock"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 1 # Runs at 00:00 on Monday UTC

jobs:
  update-devenv-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      - uses: DeterminateSystems/nix-installer-action@786fff0690178f1234e4e1fe9b536e94f5433196 # v20
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: devenv
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Run devenv update
        run: devenv update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@271a8d0340265f705b14b6d32b9829c1cb33d45e # v7.0.8
        with:
          add-paths: |
            devenv.lock
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-devenv-lock
          title: "feat(devenv)!: Update devenv.lock"
          body: |
            Automated update of devenv.lock file.

            This PR was automatically created by the scheduled workflow.
          commit-message: "feat(devenv)!: Update devenv.lock"
          delete-branch: true
          labels: |
            area/devenv
