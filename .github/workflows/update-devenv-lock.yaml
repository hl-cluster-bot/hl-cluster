---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: "Update devenv.lock"

on: # yamllint disable-line rule:truthy
  workflow_dispatch:
  schedule:
    - cron: 0 0 * * 1 # Runs at 00:00 on Monday UTC

jobs:
  update-devenv-lock:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: DeterminateSystems/nix-installer-action@c5a866b6ab867e88becbed4467b93592bce69f8a # v21
      - uses: cachix/cachix-action@0fc020193b5a1fa3ac4575aa3a7d3aa6a35435ad # v16
        with:
          name: devenv
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13

      - name: Install devenv.sh
        run: nix profile add nixpkgs#devenv

      - name: Run devenv update
        run: devenv update

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@c0f553fe549906ede9cf27b5156039d195d2ece0 # v8.1.0
        with:
          add-paths: |
            devenv.lock
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: update-devenv-lock
          title: "feat(devenv)!: Update devenv.lock"
          body: |
            Automated update of devenv.lock file.

            This PR was automatically created by the scheduled workflow.
          commit-message: "feat(devenv)!: Update devenv.lock"
          delete-branch: true
          labels: |
            area/devenv
